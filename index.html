<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字幕工坊 — 影片轉字幕</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --green: #0F6E56;
  --green-light: #1D9E75;
  --green-pale: #E1F5EE;
  --text: #1A1A1A;
  --text-2: #555;
  --text-3: #999;
  --bg: #F8F9F7;
  --bg-2: #FFFFFF;
  --border: #E2E8E4;
  --border-2: #C8D8D0;
  --red-bg: #FEF2F2;
  --red-border: #FECACA;
  --red-text: #991B1B;
  --blue: #185FA5;
  --blue-pale: #E6F1FB;
  --blue-border: #93C5FD;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; display: flex; height: 100vh; overflow: hidden; }

.panel-left { width: 380px; background: var(--bg-2); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex-shrink: 0; }
.panel-right { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

.brand { display: flex; align-items: center; gap: 12px; }
.brand-icon { width: 36px; height: 36px; background: var(--green); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
.brand h1 { font-size: 20px; font-weight: 700; }

.card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.section-title { font-size: 12px; font-weight: 700; color: var(--text-3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px; display: block; }

.input-group { margin-bottom: 12px; }
.input-group:last-child { margin-bottom: 0; }
.input-group label { display: block; font-size: 13px; margin-bottom: 5px; color: var(--text-2); font-weight: 500; }
.input-group input { width: 100%; padding: 9px 12px; border: 1px solid var(--border-2); border-radius: 8px; outline: none; font-family: inherit; font-size: 14px; transition: border-color 0.2s; }
.input-group input:focus { border-color: var(--green); }

.dropzone { border: 2px dashed var(--border-2); border-radius: 12px; padding: 28px 20px; text-align: center; cursor: pointer; transition: 0.2s; background: white; }
.dropzone:hover, .dropzone.drag-over { border-color: var(--green); background: var(--green-pale); }
.dropzone .icon { font-size: 28px; margin-bottom: 8px; }
.dropzone .label { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.dropzone .hint { font-size: 12px; color: var(--text-3); }

.editor-header { height: 56px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
.sub-list { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
.sub-item { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; gap: 12px; align-items: flex-start; }
.sub-item textarea { flex: 1; border: none; background: var(--bg); padding: 8px; border-radius: 6px; resize: none; font-family: inherit; min-height: 68px; font-size: 14px; outline: none; }
.sub-item textarea:focus { background: #f0fdf4; }
.time-box { width: 108px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-2); flex-shrink: 0; padding-top: 2px; }
.time-box .idx { font-weight: 700; color: var(--green); margin-bottom: 4px; font-size: 12px; }
.del-btn { color: var(--text-3); background: none; border: none; cursor: pointer; padding: 4px 6px; font-size: 16px; transition: 0.2s; border-radius: 4px; }
.del-btn:hover { color: var(--red-text); background: var(--red-bg); }

.btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; font-size: 13px; transition: 0.2s; }
.btn-primary { background: var(--green); color: white; }
.btn-primary:hover { background: var(--green-light); }
.btn-secondary { background: var(--border); color: var(--text-2); }
.btn-secondary:hover { background: var(--border-2); }
.btn-sm { padding: 5px 10px; font-size: 12px; margin-top: 8px; }

.status-card { background: var(--blue-pale); border: 1px solid var(--blue-border); padding: 14px; border-radius: 10px; display: none; }
.status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.spinner { width: 15px; height: 15px; border: 2px solid rgba(24,95,165,0.2); border-left-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.status-text { font-size: 13px; color: var(--blue); font-weight: 600; }
.progress-wrap { height: 5px; background: rgba(24,95,165,0.1); border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.4s ease; width: 0%; }

.banner { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
.banner.success { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }

.empty-tip { text-align: center; color: var(--text-3); margin: auto; padding: 40px 20px; }
.empty-tip .big { font-size: 48px; margin-bottom: 12px; }
.empty-tip p { font-size: 15px; }
</style>
</head>
<body>

<div class="panel-left">
  <div class="brand">
    <div class="brand-icon">S</div>
    <h1>字幕工坊</h1>
  </div>

  <div class="banner success">
    ✅ <b>免安裝版</b>：直接在瀏覽器運行，無需 FFmpeg。
  </div>

  <div class="card">
    <span class="section-title">系統設定</span>
    <div class="input-group">
      <label>OpenAI API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
    </div>
    <div class="input-group">
      <label>語言提示詞（可選）</label>
      <input type="text" id="prompt" placeholder="例如：繁體中文、專業術語...">
    </div>
  </div>

  <div class="card">
    <span class="section-title">上傳影片</span>
    <div class="dropzone" id="dropzone"
      onclick="document.getElementById('fileInput').click()"
      ondragover="event.preventDefault(); this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="event.preventDefault(); this.classList.remove('drag-over'); handleFile(event.dataTransfer.files[0])">
      <div class="icon">📁</div>
      <div class="label">點擊或拖曳影片</div>
      <div class="hint">支援 MP4 / MKV / MOV / WebM</div>
      <input type="file" id="fileInput" hidden accept="video/*,audio/*" onchange="handleFile(this.files[0])">
    </div>
    <div id="fileInfo" style="margin-top:10px; font-size:13px; color:var(--text-2); display:none;"></div>
  </div>

  <div class="status-card" id="statusCard">
    <div class="status-row">
      <div class="spinner"></div>
      <span class="status-text" id="statusText">準備中...</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="pBar"></div>
    </div>
  </div>
</div>

<div class="panel-right">
  <div class="editor-header">
    <div style="font-size: 14px; color: var(--text-2);">
      字幕段數：<span id="sCount" style="font-weight: 700; color: var(--text);">0</span>
    </div>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-secondary" onclick="addSub()">＋ 新增</button>
      <button class="btn btn-primary" onclick="exportSRT()">匯出 SRT</button>
    </div>
  </div>
  <div class="sub-list" id="subList">
    <div class="empty-tip">
      <div class="big">🎬</div>
      <p>上傳影片後，AI 將自動產生字幕</p>
    </div>
  </div>
</div>

<script>
let subs = [];
const CHUNK_SEC = 300; // 每段 5 分鐘

function setStatus(text, progress, show) {
  const card = document.getElementById('statusCard');
  card.style.display = (show !== false) ? 'block' : 'none';
  if (text !== undefined) document.getElementById('statusText').textContent = text;
  if (progress != null) document.getElementById('pBar').style.width = Math.min(progress, 100) + '%';
}

async function handleFile(file) {
  if (!file) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('請先輸入 OpenAI API Key'); return; }

  const fi = document.getElementById('fileInfo');
  fi.style.display = 'block';
  fi.textContent = `📄 ${file.name}（${(file.size / 1024 / 1024).toFixed(1)} MB）`;

  setStatus('【1/4】讀取媒體檔案...', 5);

  try {
    const arrayBuffer = await file.arrayBuffer();
    setStatus('【2/4】解碼音訊...', 15);

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx({ sampleRate: 16000 });
    let audioBuffer;
    try {
      audioBuffer = await ctx.decodeAudioData(arrayBuffer);
    } catch (e) {
      throw new Error('無法解碼音訊。請確認：\n1. 影片有聲音\n2. 格式為 MP4/WebM/MOV\n3. 若是 MKV，請先轉成 MP4');
    }
    await ctx.close();

    const mono = mixToMono(audioBuffer);
    const totalMin = Math.ceil(mono.length / 16000 / 60);
    setStatus(`【3/4】準備分段（共約 ${totalMin} 分鐘）...`, 25);

    const chunks = splitPCM(mono, 16000, CHUNK_SEC);
    let fullSrt = '';
    const prompt = document.getElementById('prompt').value.trim();

    for (let i = 0; i < chunks.length; i++) {
      const pct = 30 + (i / chunks.length) * 65;
      setStatus(`【4/4】AI 辨識中... ${i + 1} / ${chunks.length} 段`, pct);
      const wav = pcmToWav(chunks[i], 16000);
      const srtPart = await callWhisper(wav, apiKey, prompt);
      fullSrt += (fullSrt ? '\n\n' : '') + shiftSrt(srtPart, i * CHUNK_SEC);
    }

    if (!fullSrt.trim()) throw new Error('未能辨識出內容，請確認影片有清晰語音。');

    parseSrt(fullSrt);
    setStatus('✅ 辨識完成！', 100);
    setTimeout(() => setStatus('', null, false), 3000);

  } catch (err) {
    setStatus('', null, false);
    alert('❌ ' + err.message);
    console.error(err);
  }
}

function mixToMono(buf) {
  const out = new Float32Array(buf.length);
  for (let c = 0; c < buf.numberOfChannels; c++) {
    const ch = buf.getChannelData(c);
    for (let i = 0; i < buf.length; i++) out[i] += ch[i];
  }
  for (let i = 0; i < out.length; i++) out[i] /= buf.numberOfChannels;
  return out;
}

function splitPCM(pcm, sr, sec) {
  const len = Math.floor(sr * sec);
  const parts = [];
  for (let i = 0; i < pcm.length; i += len) parts.push(pcm.slice(i, i + len));
  return parts;
}

function pcmToWav(pcm, sr) {
  const buf = new ArrayBuffer(44 + pcm.length * 2);
  const v = new DataView(buf);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0, 'RIFF'); v.setUint32(4, 36 + pcm.length * 2, true);
  ws(8, 'WAVE'); ws(12, 'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true);
  v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  ws(36, 'data'); v.setUint32(40, pcm.length * 2, true);
  for (let i = 0; i < pcm.length; i++) {
    const s = Math.max(-1, Math.min(1, pcm[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 32768 : s * 32767, true);
  }
  return new Blob([buf], { type: 'audio/wav' });
}

async function callWhisper(blob, key, prompt) {
  const form = new FormData();
  form.append('file', blob, 'audio.wav');
  form.append('model', 'whisper-1');
  form.append('response_format', 'srt');
  if (prompt) form.append('prompt', prompt);
  const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST', headers: { 'Authorization': `Bearer ${key}` }, body: form
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || `OpenAI API 錯誤 (${res.status})`);
  }
  return res.text();
}

function shiftSrt(srt, sec) {
  if (!sec) return srt;
  return srt.replace(/(\d{2}:\d{2}:\d{2},\d{3})/g, m => {
    const [hms, ms] = m.split(',');
    const [h, mi, s] = hms.split(':').map(Number);
    let t = (h * 3600 + mi * 60 + s) * 1000 + +ms + sec * 1000;
    if (t < 0) t = 0;
    return [Math.floor(t/3600000), Math.floor(t%3600000/60000), Math.floor(t%60000/1000)]
      .map(n => String(n).padStart(2,'0')).join(':') + ',' + String(t%1000).padStart(3,'0');
  });
}

function parseSrt(text) {
  subs = [];
  text.trim().split(/\n\s*\n/).forEach(block => {
    const lines = block.trim().split('\n');
    const ti = lines.findIndex(l => l.includes(' --> '));
    if (ti < 0 || ti >= lines.length - 1) return;
    const [start, end] = lines[ti].split(' --> ');
    subs.push({ id: subs.length + 1, start: start.trim(), end: end.trim(), text: lines.slice(ti + 1).join('\n') });
  });
  render();
}

function render() {
  const list = document.getElementById('subList');
  document.getElementById('sCount').textContent = subs.length;
  if (!subs.length) {
    list.innerHTML = `<div class="empty-tip"><div class="big">🎬</div><p>上傳影片後，AI 將自動產生字幕</p></div>`;
    return;
  }
  list.innerHTML = subs.map((s, i) => `
    <div class="sub-item">
      <div class="time-box">
        <div class="idx">#${s.id}</div>
        <div>${s.start}</div>
        <div style="color:var(--text-3);margin:1px 0">↓</div>
        <div>${s.end}</div>
      </div>
      <textarea onchange="subs[${i}].text=this.value">${s.text}</textarea>
      <button class="del-btn" onclick="deleteSub(${i})">✕</button>
    </div>`).join('');
}

function deleteSub(i) { subs.splice(i,1); subs.forEach((s,j)=>s.id=j+1); render(); }

function addSub() {
  const last = subs[subs.length-1];
  subs.push({id:subs.length+1, start:last?.end||'00:00:00,000', end:last?.end||'00:00:05,000', text:''});
  render();
}

function exportSRT() {
  if (!subs.length) { alert('尚無字幕可匯出'); return; }
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([subs.map(s=>`${s.id}\n${s.start} --> ${s.end}\n${s.text}`).join('\n\n')], {type:'text/plain;charset=utf-8'})),
    download: 'subtitles.srt'
  });
  a.click();
}
</script>
</body>
</html>
