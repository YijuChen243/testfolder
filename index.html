<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東商線上訂飲料-中打超過30字</title>



<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: #f7f5f0;
    color: #1a1a1a;
    min-height: 100vh;
  }
  .wrap{ max-width: 680px; margin: 0 auto; padding: 0 16px 60px; }

  /* Header */
  .header{
    text-align:center; padding: 28px 0 20px;
    background: #fff;
    border-bottom: 1px solid #e8e4dc;
    margin: 0 -16px 24px;
    padding-left:16px; padding-right:16px;
  }
  .header h1{ font-size:22px; font-weight:600; color:#1a1a1a; }
  .header p{ font-size:13px; color:#888; margin-top:5px; }

  /* Tabs */
  .tabs{ display:flex; border-bottom:1px solid #e8e4dc; margin-bottom:24px; }
  .tab{
    flex:1; padding:12px 0; font-size:14px; text-align:center; cursor:pointer;
    color:#888; border-bottom:2px solid transparent; margin-bottom:-1px;
    background:none; border-left:none; border-right:none; border-top:none;
    font-weight:500;
  }
  .tab.active{ color:#BA7517; border-bottom:2px solid #BA7517; }

  .section{ display:none; } .section.active{ display:block; }

  /* Fields */
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:#888; margin-bottom:5px; font-weight:500; }
  .req{ color:#D85A30; }
  .field input{
    width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px;
    font-size:14px; color:#1a1a1a; background:#fff; outline:none;
  }
  .field input:focus{ border-color:#BA7517; }

  /* Category */
  .cat-wrap{ margin-bottom:20px; }
  .cat-title{
    font-size:11px; font-weight:600; color:#BA7517; letter-spacing:.1em;
    text-transform:uppercase; padding:6px 0; border-bottom:1px solid #e8e4dc;
    margin-bottom:10px;
  }
  .drinks-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:8px; }
  .dcard{
    border:1px solid #e8e4dc; border-radius:10px; padding:10px 12px;
    cursor:pointer; background:#fff; transition:all .15s;
  }
  .dcard:hover{ border-color:#BA7517; box-shadow:0 2px 8px rgba(186,117,23,.1); }
  .dcard.selected{ border:2px solid #BA7517; background:#fffbf5; }
  .dname{ font-size:13px; font-weight:500; color:#1a1a1a; line-height:1.4; }
  .dprice{ font-size:12px; color:#888; margin-top:3px; }
  .dtag{ font-size:10px; color:#BA7517; margin-top:4px; font-weight:500; }

  /* Options panel */
  .opt-panel{
    background:#fffbf5; border:1px solid #f0e4c8; border-radius:12px;
    padding:16px; margin-top:12px; display:none;
  }
  .opt-panel.show{ display:block; }
  .opt-title{ font-size:15px; font-weight:600; color:#1a1a1a; margin-bottom:14px; }
  .opt-row{ display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .opt-lbl{ font-size:12px; color:#888; width:40px; flex-shrink:0; font-weight:500; }
  .obtn{
    padding:5px 12px; font-size:12px; border:1px solid #ddd; border-radius:20px;
    cursor:pointer; background:#fff; color:#555; transition:all .15s;
  }
  .obtn:hover{ border-color:#BA7517; }
  .obtn.on{ background:#BA7517; border-color:#BA7517; color:#fff; }
  .obtn.tea-red.on  { background:#993C1D; border-color:#993C1D; }
  .obtn.tea-green.on{ background:#3B6D11; border-color:#3B6D11; }
  .obtn.tea-blue.on { background:#185FA5; border-color:#185FA5; }
  .obtn.tea-oolong.on{ background:#5F5E5A; border-color:#5F5E5A; }

  .add-btn{
    width:100%; padding:11px; background:#BA7517; color:#fff; border:none;
    border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:10px;
  }
  .add-btn:hover{ background:#854F0B; }

  /* Cart */
  .cart-section{ margin-top:24px; }
  .cart-title{ font-size:14px; font-weight:600; margin-bottom:10px; color:#1a1a1a; }
  .empty{ color:#bbb; font-size:13px; padding:8px 0; }
  .cart-item{
    background:#fff; border:1px solid #e8e4dc; border-radius:10px;
    padding:12px 14px; margin-bottom:8px; font-size:13px; position:relative;
  }
  .ci-name{ font-weight:500; color:#1a1a1a; }
  .ci-detail{ color:#888; font-size:12px; margin-top:3px; }
  .rm-btn{
    position:absolute; right:12px; top:12px; background:none; border:none;
    color:#ccc; cursor:pointer; font-size:16px; line-height:1;
  }
  .rm-btn:hover{ color:#D85A30; }

  .submit-btn{
    width:100%; padding:13px; background:#BA7517; color:#fff; border:none;
    border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-top:14px;
  }
  .submit-btn:hover{ background:#854F0B; }
  .submit-btn:disabled{ background:#ddd; color:#aaa; cursor:not-allowed; }

  .success-msg{
    background:#ecf7e6; color:#3B6D11; border-radius:8px;
    padding:12px 14px; font-size:13px; margin-bottom:14px; display:none;
    border:1px solid #c4e4b0;
  }

  /* Stats */
  .sc{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .ebtn{
    padding:8px 14px; border:1px solid #e0d8cc; border-radius:8px;
    font-size:13px; cursor:pointer; background:#fff; color:#555; font-weight:500;
  }
  .ebtn:hover{ background:#f7f5f0; }
  .sum-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px; }
  .scard{ background:#fff; border:1px solid #e8e4dc; border-radius:10px; padding:14px; }
  .scard-lbl{ font-size:12px; color:#888; margin-bottom:4px; }
  .scard-num{ font-size:24px; font-weight:600; color:#BA7517; }
  .drink-stat{
    background:#fff; border:1px solid #e8e4dc; border-radius:10px;
    padding:12px 14px; margin-bottom:6px;
  }
  .ds-row{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:4px; }
  .ds-name{ font-size:14px; font-weight:500; color:#1a1a1a; }
  .ds-count{ font-size:22px; font-weight:600; color:#BA7517; }
  .ds-detail{ font-size:12px; color:#888; line-height:1.8; }
  .order-card{
    border:1px solid #e8e4dc; border-radius:10px; padding:10px 14px; margin-bottom:6px;
    background:#fff;
  }
  .oc-name{ font-size:13px; font-weight:500; color:#1a1a1a; }
  .cls-tag{ font-weight:400; color:#888; font-size:12px; }
  .oc-drink{ font-size:12px; color:#888; margin-top:3px; line-height:1.6; }
  .oc-time{ font-size:11px; color:#bbb; margin-top:4px; }
  .sec-title{ font-size:14px; font-weight:600; color:#1a1a1a; margin:20px 0 8px; }
  .no-orders{ text-align:center; color:#bbb; font-size:13px; padding:40px 0; }
  #totLbl{ font-size:13px; color:#aaa; }

  /* 密碼遮罩 */
  #pwOverlay{
    display:flex; align-items:center; justify-content:center;
    padding: 40px 0;
  }
  .pw-box{
    background:#fff; border:1px solid #e8e4dc; border-radius:16px;
    padding:32px 28px; text-align:center; max-width:320px; width:100%;
  }
  .pw-icon{ font-size:36px; margin-bottom:12px; }
  .pw-title{ font-size:16px; font-weight:600; color:#1a1a1a; margin-bottom:6px; }
  .pw-desc{ font-size:13px; color:#888; margin-bottom:20px; }
  #pwInput{
    width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:8px;
    font-size:15px; text-align:center; letter-spacing:.2em; outline:none;
    margin-bottom:12px;
  }
  #pwInput:focus{ border-color:#BA7517; }
  .pw-btn{
    width:100%; padding:11px; background:#BA7517; color:#fff; border:none;
    border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;
  }
  .pw-btn:hover{ background:#854F0B; }
  .pw-err{ font-size:13px; color:#D85A30; margin-top:10px; min-height:18px; }
</style>

<body>
<div class="wrap">
  <div class="header">
    <h1>🥤 50嵐 線上訂飲料</h1>
    <p>請填寫姓名後選擇飲料，每人限點 1 杯</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="window._switchTab('order',this)">📋 訂購</button>
    <button class="tab" onclick="window._switchTab('stats',this)">📊 統計匯總</button>
  </div>

  <div id="order" class="section active">
    <div id="successMsg" class="success-msg"></div>
    <div class="field">
      <label>學生姓名 <span class="req">*</span></label>
      <input type="text" id="sName" placeholder="請輸入您的姓名">
    </div>
    <div class="field">
      <label>班級（選填）</label>
      <input type="text" id="sClass" placeholder="例：電一甲或應一甲">
    </div>
    <div id="menuBox"></div>
    <div class="opt-panel" id="optPanel">
      <div class="opt-title" id="optTitle"></div>
      <div id="teaRow" class="opt-row" style="display:none">
        <span class="opt-lbl">茶底</span>
        <div id="teaDiv"></div>
      </div>
      <div class="opt-row"><span class="opt-lbl">甜度</span><div id="sugarDiv"></div></div>
      <div class="opt-row"><span class="opt-lbl">冰塊</span><div id="iceDiv"></div></div>
      <div class="opt-row"><span class="opt-lbl">容量</span><div id="sizeDiv"></div></div>
      <button class="add-btn" onclick="window._addToCart()">加入訂單</button>
    </div>
    <div class="cart-section">
      <div class="cart-title">🛒 您的選擇</div>
      <div id="cartBox"><div class="empty">尚未選擇飲料</div></div>
      <button class="submit-btn" id="subBtn" disabled onclick="window._submitOrder()">✅ 送出訂單</button>
    </div>
  </div>

  <div id="stats" class="section">
    <!-- 密碼遮罩 -->
    <div id="pwOverlay">
      <div class="pw-box">
        <div class="pw-icon">🔒</div>
        <div class="pw-title">統計匯總（教師專區）</div>
        <div class="pw-desc">請輸入密碼以查看訂單統計</div>
        <input type="password" id="pwInput" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')window._checkPw()">
        <button class="pw-btn" onclick="window._checkPw()">確認</button>
        <div id="pwErr" class="pw-err"></div>
      </div>
    </div>
    <!-- 統計內容（解鎖後顯示） -->
    <div id="statsContent" style="display:none">
      <div class="sc">
        <button class="ebtn" onclick="window._exportCSV()">⬇ 匯出 CSV</button>
        <button class="ebtn" onclick="window._clearAll()">🗑 清除訂單</button>
        <button class="ebtn" onclick="window._lockStats()">🔒 鎖定</button>
        <span id="totLbl"></span>
      </div>
      <div id="statsBox"></div>
    </div>
  </div>
</div>
<!-- ✅ 請至 Firebase Console 建立專案後，將下方設定替換為您自己的 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // 🔧 替換成您的 Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyCri00tBFokcFKULLEX1twz4VeZFpMFRqc",
    authDomain: "drink50-aec15.firebaseapp.com",
    databaseURL: "https://drink50-aec15-default-rtdb.firebaseio.com",
    projectId: "drink50-aec15",
    storageBucket: "drink50-aec15.firebasestorage.app",
    messagingSenderId: "1001845497104",
    appId: "1:1001845497104:web:f00abe0a36bd189642d995"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const ordersRef = ref(db, 'orders');

  // ── 菜單資料 ──────────────────────────────────────────
  const TEA_RGHB = ["紅茶","綠茶","青茶","烏龍"];
  const MENU = [
    {cat:"找好茶", items:[
      {name:"茉莉綠茶",      M:35, L:40},
      {name:"阿薩姆紅茶",    M:35, L:40},
      {name:"四季春青茶",    M:35, L:40},
      {name:"黃金烏龍",      M:35, L:40},
      {name:"檸檬綠",        M:50, L:60},
      {name:"梅の綠",        M:50, L:60},
      {name:"桔子綠",        M:50, L:60},
      {name:"8冰綠",         M:50, L:60},
      {name:"養樂多綠",      M:50, L:60},
      {name:"旺來紅/柚子紅", M:50, L:60, tea:["旺來紅","柚子紅"], teaLabel:"口味"},
      {name:"鮮柚綠",        M:60, L:75},
    ]},
    {cat:"找口感", items:[
      {name:"四季春+珍波椰", M:40, L:50},
      {name:"波霸",          M:40, L:50, tea:TEA_RGHB, teaLabel:"茶底"},
      {name:"波霸奶茶",      M:50, L:60},
      {name:"波霸奶綠",      M:50, L:60},
      {name:"波霸烏龍奶茶",  M:50, L:60},
      {name:"珍珠",          M:40, L:50, tea:TEA_RGHB, teaLabel:"茶底"},
      {name:"珍珠奶茶",      M:50, L:60},
      {name:"珍珠奶綠",      M:50, L:60},
      {name:"椰果奶茶",      M:50, L:60},
    ]},
    {cat:"找奶茶", items:[
      {name:"奶茶",          M:50, L:60},
      {name:"奶綠",          M:50, L:60},
      {name:"烏龍瑪奇朵",    M:50, L:60},
      {name:"四季奶青",      M:50, L:60},
      {name:"黃金烏龍奶茶",  M:50, L:60},
      {name:"阿華田",        M:55, L:65},
    ]},
    {cat:"找新鮮", items:[
      {name:"檸檬汁",        M:55, L:65},
      {name:"金桔檸檬",      M:55, L:65},
      {name:"檸檬梅汁",      M:60, L:75},
      {name:"檸檬養樂多",    M:65, L:80},
      {name:"8冰茶",         M:50, L:60},
      {name:"柚子茶",        M:50, L:60},
      {name:"鮮柚汁",        M:60, L:75},
      {name:"葡萄柚多多",    M:65, L:80},
    ]},
    {cat:"紅茶拿鐵", items:[
      {name:"紅茶拿鐵",      M:60, L:75},
      {name:"綠茶拿鐵",      M:60, L:75},
      {name:"黃金烏龍拿鐵",  M:60, L:75},
      {name:"阿華田拿鐵",    M:65, L:80},
    ]},
    {cat:"找冰淇淋", items:[
      {name:"冰淇淋紅茶",    M:50, L:60},
      {name:"芒果青",        M:50, L:60},
      // 荔枝烏龍 已停售
    ]},
  ];

  const SUGARS = ["無糖","微糖","半糖","少糖","正常糖"];
  const ICES   = ["去冰","微冰","少冰","正常冰","熱"];
  const TEA_COLOR = {
    "紅茶":"tea-red","旺來紅":"tea-red","柚子紅":"tea-red",
    "綠茶":"tea-green","奶綠":"tea-green",
    "青茶":"tea-blue",
    "烏龍":"tea-oolong","奶茶":"tea-oolong"
  };

  let sel=null, selTea=null, selSugar="半糖", selIce="少冰", selSize="M";
  let cart=[];
  let allOrders={};   // key = Firebase push key, value = order object

  // ── 即時監聽 Firebase ─────────────────────────────────
  onValue(ordersRef, snap => {
    allOrders = snap.val() || {};
    const statsEl = document.getElementById('stats');
    if(statsEl && statsEl.classList.contains('active') && statsUnlocked) renderStats();
  });

  // ── 渲染菜單 ─────────────────────────────────────────
  function renderMenu(){
    document.getElementById('menuBox').innerHTML = MENU.map(cat=>`
      <div class="cat-wrap">
        <div class="cat-title">${cat.cat}</div>
        <div class="drinks-grid">
          ${cat.items.map(d=>`
            <div class="dcard" id="dc-${encodeURIComponent(d.name)}" onclick='window._pickDrink(${JSON.stringify(JSON.stringify(d))})'>
              <div class="dname">${d.name}</div>
              <div class="dprice">M $${d.M}　L $${d.L}</div>
              ${d.tea ? `<div class="dtag">▸ 選 ${d.teaLabel||'茶底'}</div>` : ''}
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  window._pickDrink = function(json){
    const d = JSON.parse(json);
    if(cart.length>0){ alert('每人限點 1 杯，請先移除後再重新選擇。'); return; }
    document.querySelectorAll('.dcard').forEach(c=>c.classList.remove('selected'));
    const el = document.getElementById('dc-'+encodeURIComponent(d.name));
    if(el) el.classList.add('selected');
    sel=d; selTea=d.tea?d.tea[0]:null; selSugar="半糖"; selIce="少冰"; selSize="M";
    document.getElementById('optTitle').textContent = d.name;
    renderOpts();
    const p=document.getElementById('optPanel');
    p.classList.add('show');
    p.scrollIntoView({behavior:'smooth',block:'nearest'});
  };

  function renderOpts(){
    const teaRow=document.getElementById('teaRow');
    if(sel.tea){
      teaRow.style.display='flex';
      document.getElementById('teaDiv').innerHTML = sel.tea.map(t=>{
        const cc=TEA_COLOR[t]||'';
        return `<button class="obtn ${cc} ${t===selTea?'on':''}" onclick="window._setTea('${t}')">${t}</button>`;
      }).join(' ');
    } else { teaRow.style.display='none'; }
    document.getElementById('sugarDiv').innerHTML = SUGARS.map(s=>`<button class="obtn ${s===selSugar?'on':''}" onclick="window._setSugar('${s}')">${s}</button>`).join(' ');
    document.getElementById('iceDiv').innerHTML   = ICES.map(s=>`<button class="obtn ${s===selIce?'on':''}" onclick="window._setIce('${s}')">${s}</button>`).join(' ');
    document.getElementById('sizeDiv').innerHTML  = ['M','L'].map(s=>`<button class="obtn ${s===selSize?'on':''}" onclick="window._setSize('${s}')">${s} $${sel[s]}</button>`).join(' ');
  }

  window._setTea   = v=>{selTea=v;   renderOpts();};
  window._setSugar = v=>{selSugar=v; renderOpts();};
  window._setIce   = v=>{selIce=v;   renderOpts();};
  window._setSize  = v=>{selSize=v;  renderOpts();};

  window._addToCart = ()=>{
    if(!sel) return;
    const displayName = sel.tea ? `${sel.name}（${selTea}）` : sel.name;
    cart = [{name:displayName, sugar:selSugar, ice:selIce, size:selSize, price:sel[selSize]}];
    document.querySelectorAll('.dcard').forEach(c=>c.classList.remove('selected'));
    document.getElementById('optPanel').classList.remove('show');
    sel=null;
    renderCart();
  };

  function renderCart(){
    const el=document.getElementById('cartBox');
    const btn=document.getElementById('subBtn');
    if(!cart.length){
      el.innerHTML='<div class="empty">尚未選擇飲料</div>';
      btn.disabled=true; return;
    }
    btn.disabled=false;
    el.innerHTML=cart.map((it,i)=>`
      <div class="cart-item">
        <button class="rm-btn" onclick="window._removeCart(${i})">✕</button>
        <div class="ci-name">${it.name}（${it.size}）</div>
        <div class="ci-detail">${it.sugar}・${it.ice}　$${it.price}</div>
      </div>`).join('');
  }

  window._removeCart = i=>{ cart.splice(i,1); renderCart(); };

  // ── 送出訂單 → 寫入 Firebase ─────────────────────────
  window._submitOrder = async ()=>{
    const name=document.getElementById('sName').value.trim();
    const cls =document.getElementById('sClass').value.trim();
    if(!name){ alert('請輸入學生姓名！'); document.getElementById('sName').focus(); return; }
    if(!cart.length){ alert('請選擇飲料！'); return; }
    const btn=document.getElementById('subBtn');
    btn.disabled=true; btn.textContent='送出中…';
    try{
      await push(ordersRef, {
        name, cls,
        time: new Date().toLocaleString('zh-TW'),
        item: cart[0]
      });
      cart=[];
      document.getElementById('sName').value='';
      document.getElementById('sClass').value='';
      renderCart();
      const msg=document.getElementById('successMsg');
      msg.textContent=`✅ ${name} 的訂單已送出！`;
      msg.style.display='block';
      setTimeout(()=>msg.style.display='none', 3500);
      window.scrollTo({top:0,behavior:'smooth'});
    } catch(e){
      alert('送出失敗，請確認網路連線或 Firebase 設定。\n'+e.message);
    }
    btn.disabled=false; btn.textContent='✅ 送出訂單';
  };

  // ── 切換頁籤 ─────────────────────────────────────────
  let statsUnlocked = false;

  window._switchTab = (tab, el)=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(tab).classList.add('active');
    if(tab==='stats'){
      if(statsUnlocked){
        document.getElementById('pwOverlay').style.display='none';
        document.getElementById('statsContent').style.display='block';
        renderStats();
      } else {
        document.getElementById('pwOverlay').style.display='flex';
        document.getElementById('statsContent').style.display='none';
        setTimeout(()=>document.getElementById('pwInput').focus(), 100);
      }
    }
  };

  // 🔑 密碼設定（請改成您想要的密碼）
  const STATS_PASSWORD = "teacher123";

  window._checkPw = ()=>{
    const val = document.getElementById('pwInput').value;
    if(val === STATS_PASSWORD){
      statsUnlocked = true;
      document.getElementById('pwOverlay').style.display='none';
      document.getElementById('statsContent').style.display='block';
      document.getElementById('pwInput').value='';
      document.getElementById('pwErr').textContent='';
      renderStats();
    } else {
      document.getElementById('pwErr').textContent='密碼錯誤，請再試一次';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  };

  window._lockStats = ()=>{
    statsUnlocked = false;
    document.getElementById('pwOverlay').style.display='flex';
    document.getElementById('statsContent').style.display='none';
  };

  // ── 統計頁 ───────────────────────────────────────────
  function renderStats(){
    const el=document.getElementById('statsBox');
    const orders=Object.values(allOrders);
    document.getElementById('totLbl').textContent=`共 ${orders.length} 筆訂單`;
    if(!orders.length){ el.innerHTML='<div class="no-orders">尚無訂單資料</div>'; return; }

    const dc={};
    orders.forEach(o=>{
      const it=o.item;
      const key=`${it.name}(${it.size})`;
      if(!dc[key]) dc[key]={count:0, details:{}, revenue:0};
      dc[key].count++;
      dc[key].revenue+=it.price;
      const det=`${it.sugar}・${it.ice}`;
      dc[key].details[det]=(dc[key].details[det]||0)+1;
    });

    const sorted=Object.entries(dc).sort((a,b)=>b[1].count-a[1].count);
    const totalCups=sorted.reduce((s,[,v])=>s+v.count,0);
    const totalRev =sorted.reduce((s,[,v])=>s+v.revenue,0);

    el.innerHTML=`
      <div class="sum-grid">
        <div class="scard"><div class="scard-lbl">總杯數</div><div class="scard-num">${totalCups}</div></div>
        <div class="scard"><div class="scard-lbl">訂購人數</div><div class="scard-num">${orders.length}</div></div>
        <div class="scard"><div class="scard-lbl">總金額</div><div class="scard-num">$${totalRev}</div></div>
      </div>
      <div class="sec-title">飲料統計（供廠商製作）</div>
      ${sorted.map(([name,v])=>`
        <div class="drink-stat">
          <div class="ds-row"><span class="ds-name">${name}</span><span class="ds-count">× ${v.count}</span></div>
          <div class="ds-detail">${Object.entries(v.details).map(([d,n])=>`${d} ×${n}`).join('　')}</div>
        </div>`).join('')}
      <div class="sec-title">個人訂單明細</div>
      ${orders.map(o=>`
        <div class="order-card">
          <div class="oc-name">${o.name}${o.cls?`　<span class="cls-tag">${o.cls}</span>`:''}</div>
          <div class="oc-drink">${o.item.name}（${o.item.size}）${o.item.sugar}・${o.item.ice}　$${o.item.price}</div>
          <div class="oc-time">${o.time}</div>
        </div>`).join('')}`;
  }

  // ── 匯出 CSV ─────────────────────────────────────────
  window._exportCSV = ()=>{
    const orders=Object.values(allOrders);
    if(!orders.length){ alert('尚無訂單'); return; }
    let csv='\uFEFF姓名,班級,飲料,容量,甜度,冰塊,金額,時間\n';
    orders.forEach(o=>{
      const it=o.item;
      csv+=`"${o.name}","${o.cls||''}","${it.name}","${it.size}","${it.sugar}","${it.ice}","${it.price}","${o.time}"\n`;
    });
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download='50嵐訂單統計.csv';
    a.click();
  };

  // ── 清除所有訂單 ─────────────────────────────────────
  window._clearAll = async ()=>{
    const orders=Object.values(allOrders);
    if(!orders.length){ alert('尚無訂單'); return; }
    if(!confirm(`確定清除所有 ${orders.length} 筆訂單？此動作無法復原。`)) return;
    await remove(ordersRef);
  };

  // ── 初始化（module script 執行時 DOM 已就緒）─────────
  renderMenu();
  renderCart();
</script>
</body>
</html>
