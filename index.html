<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字幕工坊 — 影片轉字幕</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --green: #0F6E56;
  --green-light: #1D9E75;
  --green-pale: #E1F5EE;
  --green-mid: #5DCAA5;
  --text: #1A1A1A;
  --text-2: #555;
  --text-3: #999;
  --bg: #F8F9F7;
  --bg-2: #FFFFFF;
  --border: #E2E8E4;
  --border-2: #C8D8D0;
  --red-bg: #FEF2F2;
  --red-border: #FECACA;
  --red-text: #991B1B;
  --blue: #185FA5;
  --blue-pale: #E6F1FB;
  --blue-border: #93C5FD;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; display: flex; height: 100vh; overflow: hidden; }

.panel-left { width: 380px; background: var(--bg-2); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
.panel-right { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.brand-icon { width: 36px; height: 36px; background: var(--green); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.brand h1 { font-size: 20px; font-weight: 700; }

.card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--text-3); text-transform: uppercase; margin-bottom: 12px; display: block; }

.input-group { margin-bottom: 12px; }
.input-group label { display: block; font-size: 13px; margin-bottom: 4px; color: var(--text-2); }
.input-group input, .input-group select { width: 100%; padding: 8px 12px; border: 1px solid var(--border-2); border-radius: 6px; outline: none; font-family: inherit; }

.dropzone { border: 2px dashed var(--border-2); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: 0.2s; background: white; }
.dropzone:hover { border-color: var(--green); background: var(--green-pale); }

.editor-header { height: 60px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
.sub-list { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.sub-item { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; gap: 12px; position: relative; align-items: flex-start; }
.sub-item textarea { flex: 1; border: none; background: var(--bg); padding: 8px; border-radius: 4px; resize: none; font-family: inherit; min-height: 70px; font-size: 14px; }
.time-box { width: 110px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-2); flex-shrink: 0; }
.del-btn { color: var(--text-3); background: none; border: none; cursor: pointer; padding: 4px; font-size: 18px; transition: 0.2s; }
.del-btn:hover { color: var(--red-text); }

.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; font-family: inherit; transition: 0.2s; }
.btn-primary { background: var(--green); color: white; }
.btn-primary:disabled { background: var(--text-3); opacity: 0.6; }
.btn-secondary { background: var(--border); color: var(--text-2); }
.btn-sm { padding: 4px 8px; font-size: 11px; margin-top: 5px; }

#statusCard { background: var(--blue-pale); border: 1px solid var(--blue-border); padding: 12px; border-radius: 8px; display: none; margin-top: 10px; }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.1); border-left-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.progress-bar-container { height: 6px; width: 100%; background: rgba(0,0,0,0.05); margin-top: 8px; border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; background: var(--green); transition: width 0.4s ease; }

.info-banner { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 10px; }
.info-banner.error { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
.info-banner.loading { background: #FFF7ED; color: #92400E; border-color: #FDE68A; }
</style>
</head>
<body>

<div class="panel-left">
  <div class="brand">
    <div class="brand-icon">S</div>
    <h1>字幕工坊</h1>
  </div>

  <div class="info-banner loading" id="securityBanner">
    ⏳ 正在載入核心組件，請稍候...
  </div>

  <div class="card">
    <span class="section-title">系統設定</span>
    <div class="input-group">
      <label>OpenAI API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
    </div>
    <div class="input-group">
      <label>提示詞 (Prompt)</label>
      <input type="text" id="prompt" placeholder="例如：繁體中文、專業術語...">
    </div>
  </div>

  <div class="card">
    <span class="section-title">上傳檔案</span>
    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()"
      ondragover="event.preventDefault(); this.style.borderColor='var(--green)'"
      ondragleave="this.style.borderColor=''"
      ondrop="event.preventDefault(); handleFileUpload(event.dataTransfer.files[0])">
      <div style="font-size: 24px; margin-bottom: 8px;">📁</div>
      <div style="font-weight: 500;">點擊或拖曳檔案</div>
      <div style="font-size: 12px; color: var(--text-3);">支援 MP4 / MKV / MOV</div>
      <input type="file" id="fileInput" hidden accept="video/*" onchange="handleFileUpload(this.files[0])">
    </div>
  </div>

  <div id="statusCard">
    <div class="spinner"></div>
    <span id="statusText" style="font-size: 13px; color: var(--blue); font-weight: 500;">準備中...</span>
    <div class="progress-bar-container">
      <div id="pBar" class="progress-bar"></div>
    </div>
  </div>
</div>

<div class="panel-right">
  <div class="editor-header">
    <div style="font-size: 14px; color: var(--text-2);">
      字幕段數：<span id="sCount" style="font-weight: 700;">0</span>
    </div>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-secondary" onclick="addSub()">+ 新增</button>
      <button class="btn btn-primary" onclick="exportSRT()">匯出 SRT</button>
    </div>
  </div>
  <div class="sub-list" id="subList">
    <div id="emptyTip" style="text-align: center; color: var(--text-3); margin-top: 100px;">
      等待檔案上傳並進行處理...
    </div>
  </div>
</div>

<!-- ✅ 修正：使用正確版本的 CDN，並確保全域變數名稱正確 -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.umd.min.js"></script>

<script>
let ffmpeg = null;
let subs = [];
const CHUNK_DURATION = 600;

// ✅ 修正：正確偵測 UMD 版本的全域變數
// @ffmpeg/ffmpeg UMD 導出為 window.FFmpegWASM（注意大寫 WASM）
// @ffmpeg/util UMD 導出為 window.FFmpegUtil
function getFFmpegGlobals() {
    // 嘗試各種可能的全域變數名稱
    const ffmpegLib = window.FFmpegWASM || window.FFmpegWasm || window['@ffmpeg/ffmpeg'];
    const utilLib = window.FFmpegUtil || window['@ffmpeg/util'];
    return { ffmpegLib, utilLib };
}

function checkStatus() {
    const banner = document.getElementById('securityBanner');
    const { ffmpegLib, utilLib } = getFFmpegGlobals();
    
    console.log('偵測全域變數：');
    console.log('FFmpegWASM:', typeof window.FFmpegWASM);
    console.log('FFmpegWasm:', typeof window.FFmpegWasm);
    console.log('FFmpegUtil:', typeof window.FFmpegUtil);
    
    if (ffmpegLib && ffmpegLib.FFmpeg && utilLib && utilLib.fetchFile) {
        banner.className = "info-banner";
        banner.innerHTML = "✅ <b>組件已就緒</b>：環境已準備完成，可以上傳影片。";
        return true;
    } else {
        const missing = [];
        if (!ffmpegLib || !ffmpegLib.FFmpeg) missing.push('FFmpeg 核心');
        if (!utilLib || !utilLib.fetchFile) missing.push('FFmpeg 工具');
        
        banner.className = "info-banner error";
        banner.innerHTML = `
            ❌ <b>載入失敗</b>：${missing.join('、')} 無法載入。<br>
            <small style="opacity:0.8">通常是網路問題或跨域限制，請嘗試：</small><br>
            <button class="btn btn-primary btn-sm" onclick="retryLoad()" style="margin-top:6px">🔄 重新載入組件</button>
        `;
        return false;
    }
}

async function retryLoad() {
    const banner = document.getElementById('securityBanner');
    banner.className = "info-banner loading";
    banner.innerHTML = "⏳ 重新載入中，請稍候...";
    
    // 移除舊腳本
    document.querySelectorAll('script[data-ffmpeg]').forEach(s => s.remove());
    
    // 重新動態載入
    await loadScript('https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.umd.min.js');
    await loadScript('https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.umd.min.js');
    
    setTimeout(checkStatus, 1000);
}

function loadScript(src) {
    return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src + '?t=' + Date.now();
        s.setAttribute('data-ffmpeg', '1');
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
    });
}

window.addEventListener('load', () => {
    // 等待腳本完成載入
    setTimeout(checkStatus, 2000);
});

function updateStatus(text, show = true, progress = null) {
    const card = document.getElementById('statusCard');
    const msg = document.getElementById('statusText');
    const pBar = document.getElementById('pBar');
    if (!card) return;
    card.style.display = show ? 'block' : 'none';
    if (text) msg.textContent = text;
    if (progress !== null) pBar.style.width = Math.min(progress, 100) + '%';
}

async function handleFileUpload(file) {
    if (!file) return;
    if (!checkStatus()) return alert("核心組件尚未載入，請點擊左側『重新載入組件』後再試");
    
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) return alert("請先輸入 OpenAI API Key");

    const { ffmpegLib, utilLib } = getFFmpegGlobals();
    updateStatus("【1/5】正在啟動引擎...", true, 5);

    try {
        if (!ffmpeg) {
            const { FFmpeg } = ffmpegLib;
            ffmpeg = new FFmpeg();
            ffmpeg.on('log', ({ message }) => console.log('[FFmpeg]', message));
            
            updateStatus("【1/5】載入 FFmpeg 核心（首次需要較長時間）...", true, 8);
            await ffmpeg.load({
                coreURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
            });
        }

        const { fetchFile } = utilLib;
        updateStatus("【2/5】載入影片中...", true, 15);
        await ffmpeg.writeFile('input_vid', await fetchFile(file));

        updateStatus("【3/5】提取音軌...", true, 30);
        await ffmpeg.exec(['-i', 'input_vid', '-vn', '-acodec', 'libmp3lame', '-b:a', '64k', '-ar', '16000', '-y', 'full_audio.mp3']);

        let currentStart = 0;
        let chunkIndex = 1;
        let fullSrtContent = "";
        let hasMore = true;

        while (hasMore) {
            updateStatus(`【4/5】切割段落 ${chunkIndex}...`, true, 40 + (chunkIndex * 2));
            
            const chunkName = `chunk_${chunkIndex}.mp3`;
            await ffmpeg.exec([
                '-ss', currentStart.toString(), 
                '-t', CHUNK_DURATION.toString(), 
                '-i', 'full_audio.mp3', 
                '-acodec', 'copy', 
                '-y',
                chunkName
            ]);

            const data = await ffmpeg.readFile(chunkName);
            if (data.length < 5000) { 
                hasMore = false;
            } else {
                const chunkBlob = new Blob([data.buffer], { type: 'audio/mpeg' });
                updateStatus(`【5/5】AI 辨識中 (段落 ${chunkIndex})...`);
                
                try {
                    const srtPart = await callWhisper(chunkBlob, apiKey);
                    const offsetedSrt = offsetSrt(srtPart, currentStart);
                    fullSrtContent += (fullSrtContent ? "\n\n" : "") + offsetedSrt;
                } catch (whisperErr) {
                    console.error("Whisper 辨識失敗：", whisperErr);
                    alert("Whisper API 呼叫失敗：" + whisperErr.message);
                }
                
                await ffmpeg.deleteFile(chunkName);
                currentStart += CHUNK_DURATION;
                chunkIndex++;
            }
            
            if (chunkIndex > 100) break; 
        }

        if (!fullSrtContent) throw new Error("未能產生字幕內容，請確認影片有聲音。");

        parseSrt(fullSrtContent);
        updateStatus("辨識完成！", true, 100);
        setTimeout(() => updateStatus("", false), 3000);

    } catch (err) {
        console.error("處理失敗：", err);
        alert("執行出錯：" + err.message);
        updateStatus("錯誤", false);
        // 重置 ffmpeg 讓下次可重試
        ffmpeg = null;
    }
}

async function callWhisper(blob, key) {
    const formData = new FormData();
    formData.append("file", blob, "audio.mp3");
    formData.append("model", "whisper-1");
    formData.append("response_format", "srt");
    const promptText = document.getElementById('prompt').value;
    if (promptText) formData.append("prompt", promptText);

    const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
        method: "POST",
        headers: { "Authorization": `Bearer ${key}` },
        body: formData
    });

    if (!res.ok) {
        const errJson = await res.json().catch(() => ({}));
        throw new Error(errJson.error?.message || `OpenAI API 請求失敗 (${res.status})`);
    }
    return await res.text();
}

function offsetSrt(srtText, offsetSeconds) {
    if (offsetSeconds === 0) return srtText;
    const timeRegex = /(\d{2}:\d{2}:\d{2},\d{3})/g;
    return srtText.replace(timeRegex, (match) => {
        let [hms, ms] = match.split(',');
        let [h, m, s] = hms.split(':').map(Number);
        let totalMs = (h * 3600 + m * 60 + s) * 1000 + Number(ms) + (offsetSeconds * 1000);
        if (totalMs < 0) totalMs = 0;
        let nh = Math.floor(totalMs / 3600000).toString().padStart(2, '0');
        let nm = Math.floor((totalMs % 3600000) / 60000).toString().padStart(2, '0');
        let ns = Math.floor((totalMs % 60000) / 1000).toString().padStart(2, '0');
        let nms = (totalMs % 1000).toString().padStart(3, '0');
        return `${nh}:${nm}:${ns},${nms}`;
    });
}

function parseSrt(text) {
    const blocks = text.trim().split(/\n\s*\n/);
    let tempSubs = [];
    blocks.forEach((block) => {
        const lines = block.split('\n');
        if (lines.length < 3) return;
        const timeLine = lines[1];
        if (!timeLine || !timeLine.includes(' --> ')) return;
        const [start, end] = timeLine.split(' --> ');
        tempSubs.push({ 
            id: tempSubs.length + 1, 
            start: start.trim(), 
            end: end.trim(), 
            text: lines.slice(2).join('\n') 
        });
    });
    subs = tempSubs;
    render();
}

function render() {
    const list = document.getElementById('subList');
    document.getElementById('sCount').textContent = subs.length;
    if (subs.length === 0) {
        list.innerHTML = `<div id="emptyTip" style="text-align: center; color: var(--text-3); margin-top: 100px;">等待檔案上傳中...</div>`;
        return;
    }
    list.innerHTML = subs.map((s, i) => `
        <div class="sub-item">
            <div class="time-box">
                <div style="font-weight:bold; color:var(--green)">#${s.id}</div>
                <div>${s.start}</div>
                <div style="margin: 2px 0; color: var(--text-3)">至</div>
                <div>${s.end}</div>
            </div>
            <textarea onchange="subs[${i}].text = this.value">${s.text}</textarea>
            <button class="del-btn" title="刪除" onclick="deleteSub(${i})">✕</button>
        </div>
    `).join('');
}

function deleteSub(index) {
    subs.splice(index, 1);
    subs.forEach((s, idx) => s.id = idx + 1);
    render();
}

function addSub() {
    const last = subs[subs.length - 1];
    subs.push({ 
        id: subs.length + 1, 
        start: last ? last.end : '00:00:00,000', 
        end: last ? last.end : '00:00:05,000', 
        text: '' 
    });
    render();
}

function exportSRT() {
    if (subs.length === 0) return alert("尚無字幕可匯出");
    const content = subs.map(s => `${s.id}\n${s.start} --> ${s.end}\n${s.text}`).join('\n\n');
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'transcription.srt';
    a.click();
    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
